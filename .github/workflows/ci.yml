name: CI

on:
  push:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'context/**'
      - 'LICENSE'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'context/**'
      - 'LICENSE'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test

  schemas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable

      - name: Regenerate schemas
        run: cargo xtask generate-schemas

      - name: Check structural invariants
        run: cargo xtask check-schemas

      - name: Fail if schemas differ from committed
        run: |
          if ! git diff --exit-code schemas/; then
            echo "Generated schemas differ from committed schemas."
            echo "Run 'cargo xtask generate-schemas' and commit the result."
            exit 1
          fi

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage (lcov, pari-core only)
        run: cargo llvm-cov --package pari-core --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        if: github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: true
